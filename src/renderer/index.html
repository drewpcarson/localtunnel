<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAN Paste Tunnel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="dropZone" class="app portal">
      <div class="portal-glow"></div>
      <div class="portal-ring"></div>

      <div class="menu-overlay left">
        <button id="toggleSetupBtn" class="icon-btn" title="Setup">⚙</button>
      </div>

      <section id="setupContent" class="overlay-panel hidden">
        <h2>Setup</h2>
        <div id="pairStatus" class="pair-status">Not paired</div>
        <label>
          Peer address
          <input id="peerUrl" type="text" placeholder="192.168.1.23:43827" />
        </label>
        <h3>Nearby devices</h3>
        <ul id="peerList" class="peer-list"></ul>
        <ul id="localUrlList" class="local-url-list"></ul>
      </section>

      <div id="orbitLayer" class="orbit-layer" aria-label="Received artifacts"></div>

      <div class="portal-content">
        <h1>PORTAL</h1>
        <p>Paste, drop, or collect drifting artifacts</p>
      </div>

      <section id="pairRequestModal" class="pair-modal hidden">
        <h2>Pair request</h2>
        <p id="pairRequestText"></p>
        <div class="pair-actions">
          <button id="pairAcceptBtn" class="mini-btn">Accept</button>
          <button id="pairDeclineBtn" class="mini-btn">Decline</button>
        </div>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
